<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Name | Download</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #24292e;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .description { color: #586069; font-size: 1.2em; margin-bottom: 30px; }
        .download-button {
            background-color: #2ea44f;
            color: white;
            padding: 15px 32px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .download-button:hover { background-color: #2c974b; }
        footer { margin-top: 50px; font-size: 0.8em; color: #6a737d; }
    </style>
</head>
<body>

    <h1>🚀 My Awesome Project</h1>
    <p class="description">
        A short, punchy description of what your project does and why it's great.
    </p>

    <!-- This link uses the "Quick & Easy" redirect mentioned earlier -->
    <a href="https://github.com/YOUR_USERNAME/YOUR_REPO/releases/latest" class="download-button">
        Download Latest Release
    </a>

    <footer>
        View the source code on <a href="https://github.com/YOUR_USERNAME/YOUR_REPO">GitHub</a>
    </footer>

</body>
</html>
